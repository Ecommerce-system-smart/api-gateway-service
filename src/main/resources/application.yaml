server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]': # Áp dụng cho tất cả các endpoint API
            allowedOrigins:
              - "http://localhost:5173" # Cho phép Frontend của bạn truy cập
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS # Bắt buộc phải có OPTIONS cho preflight request
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          # Bật khi ở Local (dùng Eureka), tắt khi lên K8s (dùng DNS)
          enabled: ${GATEWAY_DISCOVERY_ENABLED:true}
      routes:
        - id: product-service
          # Local dùng lb:// (Eureka), K8s dùng http://product-service:8081
          uri: ${PRODUCT_SERVICE_URI:lb://product-service}
          predicates:
            - Path=/api/products/**

        - id: order-service
          # Local dùng lb:// (Eureka), K8s dùng http://order-service:8082
          uri: ${ORDER_SERVICE_URI:lb://order-service}
          predicates:
            - Path=/api/orders/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URI:lb://notification-service}
          predicates:
            - Path=/api/notifications/**

  security:
    oauth2:
      resourceserver:
        jwt:
        # Dùng để so sánh với chữ 'iss' nằm bên trong Token
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:31000/realms/ecommerce-service}

        # Dùng để Gateway đi lấy public key (chìa khóa) về giải mã Token
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:31000/realms/ecommerce-service/protocol/openid-connect/certs}

# Cấu hình Eureka
eureka:
  client:
    # Cho phép K8s tắt Eureka đi để không bị báo lỗi "Connection Refused 8761"
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

# --- CÁC CẤU HÌNH DƯỚI ĐÂY GIỮ NGUYÊN VÌ LÀ LOGIC ---
resilience4j:
  circuitbreaker:
    instances:
      productService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5000
        sliding-window-size: 5
  timelimiter:
    instances:
      productService:
        timeout-duration: 3s

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      # URL của Zipkin, cho phép ghi đè khi đưa lên K8s
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
    metrics:
      tags:
        application: ${spring.application.name}